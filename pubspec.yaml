name: memorise
description: "Memorise — an interactive cognitive quiz game measuring memory, attention, and spatial observation skills. Flutter (Android & iOS)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.3.3
  path: ^1.9.0
  audioplayers: ^6.1.0
  clerk_flutter: ^0.0.16-beta
  clerk_auth: ^0.0.16-beta
  gsheets: ^0.5.0
  flutter_dotenv: ^6.0.1
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/
    - .env
