name: iOS Build

on:
  push:
    branches: [ main, master, "claude/**" ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Android debug APK
        run: ./gradlew :app:assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk

  build-ios:
    name: Build iOS (Simulator)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build shared XCFramework (Debug, Simulator)
        run: ./gradlew :shared:assembleSharedDebugXCFramework

      - name: Copy XCFramework for Xcode
        run: |
          mkdir -p shared/build/xcode-frameworks/Debug/iphonesimulator
          cp -R shared/build/XCFrameworks/debug/shared.xcframework \
            shared/build/xcode-frameworks/Debug/iphonesimulator/ 2>/dev/null || true

      - name: Build shared framework for simulator
        run: |
          ./gradlew :shared:linkDebugFrameworkIosSimulatorArm64

      - name: Prepare framework for Xcode
        run: |
          mkdir -p shared/build/xcode-frameworks/Debug/iphonesimulator
          cp -R shared/build/bin/iosSimulatorArm64/debugFramework/shared.framework \
            shared/build/xcode-frameworks/Debug/iphonesimulator/

      - name: Build iOS app (Simulator, no signing)
        run: |
          xcodebuild \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath iosApp/build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Upload iOS Simulator artifact
        uses: actions/upload-artifact@v4
        with:
          name: iosApp-simulator.app
          path: iosApp/build/Build/Products/Debug-iphonesimulator/iosApp.app
